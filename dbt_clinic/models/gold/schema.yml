version: 2

models:
  - name: gold_dim_service
    description: "Dimension service (conforme) utilisée par le datamart."
    columns:
      - name: service_id
        description: "PK technique déterministe (lower/trim + underscore)."
        tests: 
          - not_null
          - unique
      - name: service_name
        description: "Libellé normalisé du service."
        tests: 
          - not_null

  - name: gold_dim_week
    description: "Dimension semaine basée sur yearweek."
    columns:
      - name: yearweek
        description: "PK de semaine au format YYYYWW (INTEGER)."
        tests: 
          - not_null
          - unique
      - name: year
        description: "Année extraite de yearweek."
        tests: 
          - not_null
      - name: week_of_year
        description: "Numéro de semaine (1..53)."
        tests:
          - not_null

  - name: gold_dim_staff
    description: "Dimension staff (réutilise la clé technique deterministe du TP1)."
    columns:
      - name: staff_id
        tests:
          - not_null
          - unique
      - name: staff_name
        tests:
          - not_null
      - name: role
        tests:
          - not_null

  - name: gold_fact_service_weekly
    description: |
      Table de faits hebdomadaire au grain 1 service x 1 semaine.
      Les agrégations sont réalisées avant jointures pour éviter les duplications.
    columns:
      - name: service_week_id
        description: "PK technique : service_id + '_' + yearweek."
        tests: 
          - not_null
          - unique

      - name: service_id
        description: "FK vers gold_dim_service."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_service')
                field: service_id

      - name: yearweek
        description: "FK vers gold_dim_week."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_week')
                field: yearweek

      - name: requests_count
        tests: 
          - not_null
      - name: admitted_count
        tests:
          - not_null
      - name: refused_count
        tests:
          - not_null
      - name: refusal_rate
        tests:
          - not_null